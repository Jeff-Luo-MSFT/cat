################################################################################
# Microsoft Agent Platform Advisor — Scoring Matrix
# Platforms: Agent Builder (agent_builder), M365 Copilot (m365_copilot),
#            Copilot Studio (copilot_studio), Microsoft Foundry (foundry)
#
# Score scale: 0 = not a fit · 1 = weak signal · 2 = moderate · 3 = strong
# Max raw score per platform: 24 (8 questions × max 3)
################################################################################

meta:
  version: "1.0"
  scale_max: 3
  questions_count: 7
  platforms:
    - id: agent_builder
      label: Agent Builder
    - id: m365_copilot
      label: M365 Copilot
    - id: copilot_studio
      label: Copilot Studio
    - id: foundry
      label: Microsoft Foundry

################################################################################
# QUESTIONS
################################################################################

questions:

  - id: q1
    label: Who is building this agent?
    purpose: Sets persona weight for interpreting later answers
    prompt: Some platforms require a developer, while others are designed for business users with no coding experience.
    options:
      - id: q1a
        label: Business user or subject matter expert — no coding experience
        scores:
          agent_builder: 3
          m365_copilot: 2
          copilot_studio: 1
          foundry: 0

      - id: q1b
        label: Power Platform maker or IT pro — comfortable with low-code tools
        scores:
          agent_builder: 1
          m365_copilot: 1
          copilot_studio: 3
          foundry: 1

      - id: q1c
        label: Professional developer — comfortable with code, APIs, and SDKs
        scores:
          agent_builder: 0
          m365_copilot: 1
          copilot_studio: 2
          foundry: 3

      - id: q1d
        label: Data or ML engineer — working with models, pipelines, or infrastructure
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 1
          foundry: 3

  - id: q2
    label: Where will people use this agent?
    purpose: Deployment surface is often a hard constraint
    prompt: Think about where users will actually open and interact with the agent day-to-day.
    options:
      - id: q2a
        label: Inside Microsoft 365 apps — Teams, Copilot, SharePoint, or Outlook
        scores:
          agent_builder: 3
          m365_copilot: 3
          copilot_studio: 2
          foundry: 0

      - id: q2b
        label: In a custom web or mobile application your team builds or hosts
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 2
          foundry: 3

      - id: q2c
        label: Triggered by a business process or automated workflow — not directly by a user
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 3
          foundry: 2

      - id: q2d
        label: Multiple surfaces, or not decided yet
        scores:
          agent_builder: 1
          m365_copilot: 1
          copilot_studio: 3
          foundry: 2

  - id: q3
    label: What data does the agent need to access?
    purpose: Grounding requirements narrow the field fast
    prompt: Where does the agent's knowledge and context come from? Choose the best fit for your primary data source.
    options:
      - id: q3a
        label: Content already in Microsoft 365 — SharePoint, OneDrive, Teams, or Outlook
        scores:
          agent_builder: 3
          m365_copilot: 3
          copilot_studio: 2
          foundry: 0

      - id: q3b
        label: External business systems or APIs — CRM, ERP, ticketing, or databases
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 3
          foundry: 2

      - id: q3c
        label: Custom or proprietary data — data lakes, vector stores, or private warehouses
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 1
          foundry: 3

      - id: q3d
        label: A combination of M365 content and external systems
        scores:
          agent_builder: 0
          m365_copilot: 1
          copilot_studio: 3
          foundry: 2

  - id: q4
    label: What does this agent actually do?
    purpose: Single strongest discriminator between Copilot Studio and Foundry
    prompt: Think about the interactions users will have with the agent and the complexity of tasks it needs to complete.
    hard_rules:
      - condition: option == q4d
        effect: >
          Set foundry = 3. Cap agent_builder and m365_copilot at 0
          regardless of other answers.
    options:
      - id: q4a
        label: Answers questions in a single exchange — Q&A, lookups, or summaries
        scores:
          agent_builder: 3
          m365_copilot: 3
          copilot_studio: 2
          foundry: 0

      - id: q4b
        label: Holds a back-and-forth conversation and remembers context throughout
        scores:
          agent_builder: 1
          m365_copilot: 2
          copilot_studio: 3
          foundry: 1

      - id: q4c
        label: Completes multi-step tasks — branching decisions, calling multiple systems, or taking actions on behalf of the user
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 3
          foundry: 2

      - id: q4d
        label: Coordinates multiple agents, manages long-running workflows, or requires a fully custom reasoning approach
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 1
          foundry: 3
        hard_rule_trigger: true

  - id: q5
    label: How much technical customization will this need?
    purpose: Distinguishes no-code → low-code → pro-code ceiling
    prompt: Consider the integrations, business logic, and controls your agent will need beyond a standard chat interface.
    hard_rules:
      - condition: option == q5d
        effect: >
          Set foundry = 3. Set agent_builder, m365_copilot, and copilot_studio to 0.
          Surface a direct Foundry recommendation and skip remaining questions.
    options:
      - id: q5a
        label: None — configured through a visual UI, no code required
        scores:
          agent_builder: 3
          m365_copilot: 2
          copilot_studio: 1
          foundry: 0

      - id: q5b
        label: Some — custom connectors, plugins, or Power Automate flows
        scores:
          agent_builder: 0
          m365_copilot: 1
          copilot_studio: 3
          foundry: 1

      - id: q5c
        label: Significant — custom APIs, business logic in code, or SDK-level control
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 2
          foundry: 3

      - id: q5d
        label: Full control — custom model, custom orchestration, or raw cloud infrastructure
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 0
          foundry: 3
        hard_rule_trigger: true

  - id: q7
    label: What platforms does your organization already use?
    purpose: Tiebreaker when top two scores are within 2 points
    prompt: Existing tools, licenses, and skills often make one platform a more practical starting point than another.
    tiebreaker:
      applies_when:
        top_two_scores_within_points: 2
      weight_multiplier: 1.5
    options:
      - id: q7a
        label: Primarily Microsoft 365 and Teams — little or no Azure footprint
        scores:
          agent_builder: 3
          m365_copilot: 3
          copilot_studio: 2
          foundry: 0

      - id: q7b
        label: Power Platform is already in use — Power Automate, Power Apps, or Dataverse
        scores:
          agent_builder: 1
          m365_copilot: 1
          copilot_studio: 3
          foundry: 1

      - id: q7c
        label: Significant Azure investment — Azure AI, OpenAI Service, or Azure infrastructure
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 2
          foundry: 3

      - id: q7d
        label: Starting fresh — no strong commitment to a specific platform yet
        scores:
          agent_builder: 1
          m365_copilot: 1
          copilot_studio: 2
          foundry: 2

  - id: q8
    label: Who will use this agent?
    purpose: External-facing is a hard constraint that affects platform eligibility
    prompt: Some platforms only work within your Microsoft 365 tenant. If external users need to interact with the agent, that narrows your options significantly.
    hard_rules:
      - condition: option in [q8b, q8c]
        effect: >
          Set agent_builder = 0 and m365_copilot = 0.
          Agent Builder has no external publishing path.
          M365 Copilot is tenant-scoped only.
    options:
      - id: q8a
        label: Internal employees only — everyone is within our Microsoft 365 tenant
        scores:
          agent_builder: 3
          m365_copilot: 3
          copilot_studio: 2
          foundry: 1

      - id: q8b
        label: External users — customers, partners, or the public
        scores:
          agent_builder: 0
          m365_copilot: 0
          copilot_studio: 3
          foundry: 3
        hard_rule_trigger: true

      - id: q8c
        label: Both — internal employees and external users
        scores:
          agent_builder: 0
          m365_copilot: 1
          copilot_studio: 3
          foundry: 2
        hard_rule_trigger: true

      - id: q8d
        label: Not decided yet
        scores:
          agent_builder: 2
          m365_copilot: 2
          copilot_studio: 2
          foundry: 1

################################################################################
# SCORING ENGINE
################################################################################

scoring:

  # Step 1 — Hard rules are evaluated before summing.
  # They cap or zero out platforms regardless of cumulative scores.
  # Hard rules represent real platform limitations, not preferences.
  hard_rule_evaluation: pre_sum

  # Step 2 — Sum raw scores across all answered questions.
  raw_score_max: 21  # 7 questions × max score of 3

  # Step 3 — Apply tiebreaker weight if top two are within threshold.
  tiebreaker:
    question_id: q7
    applies_when_top_two_within: 2
    weight_multiplier: 1.5

  # Step 4 — Map final scores to recommendation strength.
  recommendation_thresholds:
    - min: 18
      max: 24
      label: Strong fit
      description: This platform is well-aligned with your requirements across all dimensions.
    - min: 12
      max: 17
      label: Good fit
      description: This platform meets most of your requirements with minor tradeoffs.
    - min: 6
      max: 11
      label: Possible fit — review tradeoffs
      description: This platform can address your scenario but may require workarounds.
    - min: 0
      max: 5
      label: Not recommended
      description: This platform is unlikely to meet your requirements in this scenario.

  # Step 5 — Tie handling: surface both as a complementary pair.
  tie_handling:
    threshold_points: 1
    present_as: complementary_pair
    valid_pairs:
      - platforms: [copilot_studio, foundry]
        rationale: Build in Copilot Studio, extend with custom code in Foundry.
      - platforms: [m365_copilot, copilot_studio]
        rationale: M365 Copilot for end users, Copilot Studio for customization and extension.
      - platforms: [agent_builder, m365_copilot]
        rationale: Agent Builder for M365-native agents, M365 Copilot for broader extensibility.

################################################################################
# RECOMMENDATION COPY
################################################################################

recommendations:

  agent_builder:
    headline: Agent Builder
    summary: >
      The right starting point for business users who want to build
      agents directly inside Microsoft 365 without writing code.
    best_for:
      - No-code creators working within M365
      - Internal-only agents grounded in SharePoint or OneDrive
      - Simple Q&A, summarization, or lookup scenarios
    watch_out_for:
      - No external user publishing path
      - Limited to M365 grounding sources
      - Not suitable for custom logic or external system integration
    templates:
      - label: Career Coach
        description: Personalized career development plans, skill gap analysis, and actionable advice
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-career-coach
      - label: Corporate Communications Crafter
        description: On-brand internal and external communications — announcements, newsletters, exec updates
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-corporate-communications
      - label: Customer Insight Assistant
        description: Detailed customer profiles including industry, priorities, leadership, and competitors
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-customer-insight
      - label: Idea Coach
        description: Guided brainstorming sessions with creative exercises to develop and refine ideas
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-idea-coach
      - label: Interview Question Assistant
        description: Tailored, high-quality interview questions based on role and job description
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-interview-questions
      - label: Learning Coach
        description: Structured learning plans and topic summaries tailored to individual knowledge gaps
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-learning-coach
      - label: Meeting Coach
        description: Structured agendas, role assignments, and real-time guidance to run effective meetings
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-meeting-coach
      - label: Prompt Coach
        description: Guides users in crafting well-structured Copilot prompts through interactive feedback
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-prompt-coach
      - label: Request for Proposal Assistant
        description: Generates tailored RFP response drafts from existing proposal content and templates
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-rfp-assistant
      - label: Quiz Tutor
        description: Interactive quizzes based on training content to reinforce learning and knowledge retention
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-quiz-tutor
      - label: Scrum Assistant
        description: Real-time guidance on scrum ceremonies, backlog management, and Agile best practices
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-scrum-assistant
      - label: Text Translator Assistant
        description: Translates text, adjusts tone for professional communication, and improves writing quality
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-text-translator
      - label: Writing Coach
        description: Detailed feedback on clarity, coherence, grammar, and tone to elevate writing quality
        url: https://learn.microsoft.com/microsoft-365/copilot/extensibility/agent-template-writing-coach

  m365_copilot:
    headline: M365 Copilot
    summary: >
      Best for extending the native Copilot experience inside Microsoft 365
      apps through plugins, connectors, and declarative agents.
    best_for:
      - Extending Copilot within Teams, Outlook, and SharePoint
      - Scenarios grounded in M365 content
      - IT pros and makers comfortable with Microsoft 365 admin
    watch_out_for:
      - Tenant-scoped — no external user access
      - Limited customization compared to Copilot Studio
      - Not suited for complex multi-step workflows
    first_party_agents:
      - label: Copilot for Sales
        description: Seller productivity in Teams, Outlook, and CRM apps
        url: https://learn.microsoft.com/microsoft-sales-copilot/
      - label: Copilot for Service
        description: Customer service agent assistance across support channels
        url: https://learn.microsoft.com/microsoft-copilot-service/
      - label: Copilot for Finance
        description: Financial workflows, analysis, and reconciliation in Excel and Outlook
        url: https://learn.microsoft.com/copilot/finance/
      - label: Employee Self-Service Agent
        description: HR and IT self-service within Teams for policies, FAQs, and requests
        url: https://learn.microsoft.com/copilot/microsoft-365/employee-self-service/overview
      - label: SharePoint Agent
        description: Q&A grounded in a specific SharePoint site or document library
        url: https://support.microsoft.com/office/get-started-with-sharepoint-agents-69e2faf9-2c1e-4baa-8305-23e625021bcf
      - label: Facilitator Agent
        description: Meeting facilitation, real-time notes, and action items in Teams
        url: https://learn.microsoft.com/microsoftteams/facilitator-teams
      - label: Researcher Agent
        description: Synthesizes information from the web and M365 to produce in-depth research and content
        url: https://techcommunity.microsoft.com/blog/microsoft365copilotblog/researcher-agent-in-microsoft-365-copilot/4397186
      - label: Analyst Agent
        description: Transforms complex data into clear insights, charts, and visualizations using Python
        url: https://www.microsoft.com/microsoft-365/blog/2025/03/25/introducing-researcher-and-analyst-in-microsoft-365-copilot/
      - label: Interpreter Agent
        description: Real-time speech-to-speech interpretation in Teams meetings across nine languages
        url: https://learn.microsoft.com/microsoftteams/interpreter-agent-teams
      - label: Project Manager Agent
        description: Automates project plan creation, task tracking, and status reporting in Planner (preview)
        url: https://aka.ms/agents/ProjectManagerDocs
      - label: Channel Agent
        description: Teams channel expert for summarizing conversations, managing tasks, and boosting productivity (preview)
        url: https://support.microsoft.com/office/get-started-with-channel-agent-for-teams-channels-b85945cf-deef-4f1e-9db1-66e1a23b6a65
      - label: Community Agent
        description: Accelerates knowledge sharing and surfaces expertise across org communities in Viva Engage (preview)
        url: https://learn.microsoft.com/viva/engage/ai-technology-with-viva-engage/agents-community-network-deployment-config

  copilot_studio:
    headline: Copilot Studio
    summary: >
      The most flexible low-code platform for building production-grade agents
      that connect to external systems, publish to multiple surfaces, and
      integrate with Power Platform.
    best_for:
      - Low-code makers and IT pros
      - Agents connecting to external APIs, CRM, ERP, or databases
      - Multi-turn conversational experiences
      - Internal and external-facing deployment
    watch_out_for:
      - Complex ML pipelines or custom model training require Foundry
      - Long-running multi-agent orchestration is better served by Foundry

  foundry:
    headline: Microsoft Foundry
    summary: >
      The right choice when you need full engineering control — custom models,
      complex orchestration, sovereign cloud, or infrastructure-level integration.
    best_for:
      - Professional developers and ML engineers
      - Custom model deployment (BYOM) or fine-tuning
      - Multi-agent topologies with complex state management
      - Strict compliance requirements (HIPAA, FedRAMP, sovereign cloud)
      - Agents embedded in custom-built applications
    watch_out_for:
      - Higher implementation complexity and time-to-value
      - Requires Azure expertise and development resources
      - Overkill for standard M365-native or low-code scenarios

